  </text>
  <text x="40" y="100" font-family="monospace" font-size="16" font-weight="bold" fill="#ff3333" xml:space="preserve">
  ██╔════╝██║     ██╔══██╗██╔════╝██║  ██║
  </text>
  <text x="40" y="120" font-family="monospace" font-size="16" font-weight="bold" fill="#ff3333" xml:space="preserve">
  █████╗  ██║     ███████║███████╗███████║
  </text>
  <text x="40" y="140" font-family="monospace" font-size="16" font-weight="bold" fill="#ff3333" xml:space="preserve">
  ██╔══╝  ██║     ██╔══██║╚════██║██╔══██║
  </text>
  <text x="40" y="160" font-family="monospace" font-size="16" font-weight="bold" fill="#ff3333" xml:space="preserve">
  ██║     ███████╗██║  ██║███████║██║  ██║
  </text>
  <text x="40" y="180" font-family="monospace" font-size="16" font-weight="bold" fill="#ff3333" xml:space="preserve">
  ╚═╝     ╚══════╝╚═╝  ╚═╝╚══════╝╚═╝  ╚═╝
  </text>

  <!-- Tagline -->
  <text x="40" y="230" font-family="monospace" font-size="16" fill="#ff3333">
  The Semantic Time Machine for 2026
  </text>

  <!-- Prompt -->
  <text x="40" y="270" font-family="monospace" font-size="16" fill="#ff3333">
  ? What would you like to know about this codebase? <tspan fill="#666666">› Where is the WorkspaceScanner defined?</tspan>
  </text>

  <!-- Spinner -->
  <text x="40" y="310" font-family="monospace" font-size="16" font-weight="bold" fill="#ff3333">
